name: Harness Policy Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Risk policy gate - runs first, fast, cheap
  risk-policy-gate:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    outputs:
      highest-risk: ${{ steps.gate.outputs.highestRisk }}
      required-checks: ${{ steps.gate.outputs.requiredChecks }}
      review-required: ${{ steps.gate.outputs.reviewRequired }}
      changed-files: ${{ steps.gate.outputs.changedFileCount }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run risk policy gate
        id: gate
        run: |
          echo "Running risk policy validation..."
          node scripts/risk-policy-gate.js
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}

  # Step 2: Lint and format (all tiers)
  lint-and-format:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: risk-policy-gate
    if: success()
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm install
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Pattern analysis
        run: npm run test:patterns

  # Step 3: Smoke test (high/critical only)
  smoke-test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: risk-policy-gate
    if: success() && (contains(needs.risk-policy-gate.outputs.highest-risk, 'high') || contains(needs.risk-policy-gate.outputs.highest-risk, 'critical'))
    steps:
      - uses: actions/checkout@v5
      - name: Run smoke test
        run: bash scripts/test-setup.sh --ci

  # Step 4: Security scan (critical only)
  security-scan:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: risk-policy-gate
    if: success() && contains(needs.risk-policy-gate.outputs.highest-risk, 'critical')
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm install
      - name: Dependency audit
        run: npm audit --audit-level high
      - name: Secret scan (if gitleaks available)
        run: |
          if command -v gitleaks &> /dev/null; then
            gitleaks detect --source . --log-level info --exit-code 1
          else
            echo "gitleaks not available, skipping secret scan"
          fi

  # Step 5: Verify local review was performed (replaces AI review in CI)
  # Checks for Reviewed-By trailer from /bs:quality — zero AI minutes used
  local-review-check:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: risk-policy-gate
    if: success() && (contains(needs.risk-policy-gate.outputs.highest-risk, 'high') || contains(needs.risk-policy-gate.outputs.highest-risk, 'critical'))
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for local review stamp
        env:
          RISK_TIER: ${{ needs.risk-policy-gate.outputs.highest-risk }}
          FILE_COUNT: ${{ needs.risk-policy-gate.outputs.changed-files }}
        run: |
          echo "Checking for local code review stamp..."

          # Get all commits in this PR
          BASE_SHA=$(git merge-base origin/main HEAD)
          COMMITS=$(git log --format="%H" "$BASE_SHA"..HEAD)

          REVIEW_FOUND=false
          for sha in $COMMITS; do
            if git log -1 --format="%B" "$sha" | grep -q "Reviewed-By: claude-quality"; then
              REVIEW_FOUND=true
              REVIEW_LINE=$(git log -1 --format="%B" "$sha" | grep "Reviewed-By: claude-quality")
              echo "Found review stamp in commit $sha"
              echo "  $REVIEW_LINE"
              break
            fi
          done

          if [ "$REVIEW_FOUND" = true ]; then
            echo "✅ Local code review verified"
            {
              echo "## ✅ Local Review Verified"
              echo ""
              echo "Review stamp found: \`$REVIEW_LINE\`"
              echo ""
              echo "_AI review was performed locally — no CI minutes consumed._"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ No local review stamp found"
            {
              echo "## ⚠️ No Local Review Stamp"
              echo ""
              echo "No \`Reviewed-By: claude-quality\` trailer found in PR commits."
              echo "Run \`/bs:quality --scope branch\` locally before pushing."
              echo ""
              echo "Risk tier: $RISK_TIER | Changed files: $FILE_COUNT"
              echo ""
              echo "This is a warning, not a blocker — but unreviewed high/critical changes should get local review."
            } >> "$GITHUB_STEP_SUMMARY"

            # Warning only, not a hard fail — allows hotfixes through
            echo "::warning::No local review stamp found. Run /bs:quality locally for high/critical changes."
          fi

  # Step 6: Summary
  harness-summary:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [risk-policy-gate, lint-and-format, smoke-test, security-scan, local-review-check]
    if: always() && needs.risk-policy-gate.result == 'success'
    steps:
      - uses: actions/checkout@v5
      - name: Harness Summary
        env:
          RISK_TIER: ${{ needs.risk-policy-gate.outputs.highest-risk }}
          FILE_COUNT: ${{ needs.risk-policy-gate.outputs.changed-files }}
          LINT_RESULT: ${{ needs.lint-and-format.result }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
          SECURITY_RESULT: ${{ needs.security-scan.result }}
          REVIEW_RESULT: ${{ needs.local-review-check.result }}
        run: |
          {
            echo "## Harness Policy Summary"
            echo ""
            echo "**Risk Tier:** $RISK_TIER"
            echo "**Changed Files:** $FILE_COUNT"
            echo ""
            echo "**Check Results:**"
            echo "- ✅ Risk Policy Gate: Passed"

            if [ "$LINT_RESULT" = "success" ]; then
              echo "- ✅ Lint & Format: passed"
            else
              echo "- ❌ Lint & Format: $LINT_RESULT"
            fi

            if [ "$SMOKE_RESULT" != "skipped" ]; then
              if [ "$SMOKE_RESULT" = "success" ]; then
                echo "- ✅ Smoke Test: passed"
              else
                echo "- ❌ Smoke Test: $SMOKE_RESULT"
              fi
            fi

            if [ "$SECURITY_RESULT" != "skipped" ]; then
              if [ "$SECURITY_RESULT" = "success" ]; then
                echo "- ✅ Security Scan: passed"
              else
                echo "- ❌ Security Scan: $SECURITY_RESULT"
              fi
            fi

            if [ "$REVIEW_RESULT" != "skipped" ]; then
              if [ "$REVIEW_RESULT" = "success" ]; then
                echo "- ✅ Local Review Check: passed"
              else
                echo "- ⚠️ Local Review Check: $REVIEW_RESULT"
              fi
            fi

            echo ""
            echo "_Local-first review strategy — AI review runs on your machine, CI only verifies._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check overall status
        env:
          LINT_RESULT: ${{ needs.lint-and-format.result }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
          SECURITY_RESULT: ${{ needs.security-scan.result }}
        run: |
          if [ "$LINT_RESULT" = "failure" ]; then
            echo "❌ Lint and format checks failed"
            exit 1
          fi

          if [ "$SMOKE_RESULT" = "failure" ]; then
            echo "❌ Smoke test failed"
            exit 1
          fi

          if [ "$SECURITY_RESULT" = "failure" ]; then
            echo "❌ Security scan failed"
            exit 1
          fi

          # local-review-check is advisory, not blocking

          echo "✅ All harness checks passed"
